name: Deploy to GitHub Pages

on:
  push:
    branches: [source]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write  # Needed to push to master branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python/uv
        uses: astral-sh/setup-uv@v5

      - name: Install system dependencies needed for sitegen
        run: |
          sudo apt-get update
          sudo apt-get install -y libcmark-gfm-dev libcmark-gfm-extensions-dev

      - name: Build sitegen
        run: odin build sitegen

      - name: Build site
        run: ./sitegen.bin --output output_prod --config-file config_sitegen.json

      - name: Validate site output
        run: |
          echo "Checking that output_prod contains expected files..."
          if [ ! -s output_prod/index.html ]; then
            echo "ERROR: output_prod/index.html is missing or empty"
            exit 1
          fi
          if [ ! -f output_prod/CNAME ]; then
            echo "ERROR: output_prod/CNAME is missing"
            exit 1
          fi
          # Blog posts are organized by date: output_prod/YYYY/MM/DD/slug.html
          post_count=$(find output_prod -name "*.html" -path "*/[0-9][0-9][0-9][0-9]/*" | wc -l)
          if [ "$post_count" -eq 0 ]; then
            echo "ERROR: No blog post HTML files found in output_prod"
            exit 1
          fi
          echo "Validation passed: index.html present, CNAME present, $post_count blog post(s) found."

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output_prod
          publish_branch: master
          force_orphan: true
